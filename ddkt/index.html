<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>🐥 Đua Vịt Mượt Mà 🏁</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        /* ... (Giữ nguyên toàn bộ CSS cũ) ... */
        /* Thêm CSS cho nút và giao diện từ phiên bản trước */
        body {
            font-family: "Segoe UI", sans-serif;
            background: url("songnuoc.gif") no-repeat center center;
            background-size: cover;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        h1 { color: white; text-shadow:2px 2px 5px #000; margin-top:10px; }
        #controls { position: fixed; top: 0px; right: 0px; margin:0px; z-index: 900; }
        #pond-container { overflow:hidden; width:100vw; height:100vh; border-top:6px solid white; border-bottom:6px solid #004080; position:relative; }
        #pond { position: absolute; top: 200px; left: 0; width: 13000px; height: calc(100% - 200px); transition: transform 0.1s linear; z-index: 11; }
        .duck { position:absolute; left:0; width:170px; height:170px }
        .duck img { width:170px; height:170px; transform: scaleX(1)}
        .name {
            color:black; font-weight:bold; font-size:14px; position:absolute; top:0px; right: 60%;
            background: #fff;
            border-radius: 50px;
            padding: 2px 8px;
        }
        #countdown { font-size:160px; color:white; text-shadow:2px 2px 5px black; position:absolute; top:50%; width:100%; display:none; z-index:4; }
        #raceTimer { position: fixed; top:210px; right:10px; font-size:60px; color:black; text-shadow:1px 1px 3px black; z-index:5; background: url("thoigian.png") no-repeat; background-size: 100% 100%; padding: 16px; }
        #result { position: absolute; bottom: 10px; left: 50%; transform: translate(-50%, -50%); font-size: 60px; color: black; text-shadow: 1px 1px 3px black; margin-top: 10px; z-index: 12; text-align: center; pointer-events: none; background: gold; background: url("bangten.png") no-repeat; background-size: 100% 100%; padding: 6px 16px; max-width: 80vw; }
        .bubble { position:absolute; width:10px; height:10px; background:rgba(255,255,255,0.7); border-radius:50%; animation:bubbleUp 2s linear forwards; z-index:1; }
        .splash { position:absolute; width:15px; height:15px; border-radius:50%; background:rgba(255,255,255,0.8); animation:splashUp 0.6s ease-out forwards; }
        .confetti { position:absolute; width:8px; height:8px; border-radius:2px; animation:confettiFall 1s linear forwards; }
        .water-ring { position: absolute; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.6); border-radius: 50%; opacity: 1; animation: ringExpand 1.5s ease-out forwards; pointer-events: none; z-index: 1; }
        @keyframes bubbleUp { 0% { transform:translateY(0); opacity:1; } 100% { transform:translateY(-80px); opacity:0; } }
        @keyframes splashUp { 0%{ transform:scale(1) translateY(0); opacity:1; } 100%{ transform:scale(2) translateY(-40px); opacity:0; } }
        @keyframes confettiFall { 0%{ opacity:1; transform:translateY(0) rotate(0deg);} 100%{opacity:0; transform:translateY(-80px) rotate(360deg);} }
        @keyframes ringExpand { 0% { transform: scale(1); opacity: 0.9; } 100% { transform: scale(6); opacity: 0; } }
        .winner-glow { box-shadow: 0 0 30px 10px gold; border-radius: 50%; animation: glowRotate 2s linear infinite; }
        #bank { position: absolute; top: 0; left: -1000px; width: 13000px; height: 180px; background: url("boco.jpg") repeat-x center bottom; z-index: 5; }
        .tree { position: absolute; bottom: 0; background-repeat: no-repeat; background-position: center bottom; background-size: contain; pointer-events: none; z-index: 6; }
        .start-line { position: absolute; top: 180px; width: 100px; left: 100px; height: calc(100% - 180px); background: url("vachxuatphat.jpg") repeat-y center top; z-index: 1; }
        .bo { position: absolute; top: 160px; left: -1000px; width: 13000px; height: 50px; background: url("bo.png") repeat-x center bottom; z-index: 8; }
        .xuatphat { position: absolute; top: 50%; left: 50%; width: 600px; height: 400px; background: url("xuatphat.png") no-repeat center center; background-size: contain; transform: translate(-50%, -50%); z-index: 10; transition: opacity 0.8s ease-out; }
        .vedich { position: absolute; top: 50%; left: 50%; width: 600px; height: 400px; background: url("vedich.png") no-repeat center center; background-size: contain; transform: translate(-50%, -50%); z-index: 10; transition: opacity 0.8s ease-out; }
        .hidden { opacity: 0; pointer-events: none; }
        .menu-container { transform: translate(-50%, -50%); background: url("menu1.png") no-repeat; width: 1200px; padding: 0 65px 65px 65px; background-size: 100% 100%; flex-direction: row; display: flex; max-height: 90vh; transform: scale(0.9); transition: transform 0.3s ease; z-index: 1000; }
        .winner-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 1000; }
        .winner-menu.show { opacity: 1; pointer-events: all; }
        .winner-menu.show .menu-container { transform: scale(1); }
        .close-btn { margin-top: 10px; background: #ff4d4d; border: none; color: white; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
        .clear-btn { background: #ff9800; border: none; color: white; padding: 6px 12px; border-radius: 8px; cursor: pointer; margin-right: 8px; }
        .buton_dk{ position: fixed; bottom:10px; right: 10px; }
        #winnerList { max-height: 300px; overflow-y: auto; padding-right: 5px; }
        .danhsach h3, .setup h3 { margin-top: 0; border-bottom: 2px solid #0078ff; padding-bottom: 6px; color: #0078ff; font-size: 20px; }
        .option { font-size: 20px; margin: 10px 0; text-align: left; }
        input{ font-size: 20px !important; width: 20px; height: 20px; accent-color: #0078ff; cursor: pointer; }
        .danhsach { flex: 1; padding: 100px 10px 40px 60px; }
        .setup { flex: 1; padding: 90px 50px 40px 10px; text-align: left; }
        .question-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .qbox { background: white; padding: 20px; border-radius: 12px; max-width: 500px; text-align: left; color: black; }
        .qbox .highlight { color: #0077ff; font-weight: bold; }
        #questionArea h3{ font-size: 28px !important; }
        #questionArea button{ font-size: 28px !important; border-radius: 6px; }
        #questionArea{ z-index: 900; }
        .traloicauhoi { display: flex; justify-content: center; align-items: center; position: absolute; top: 50%; right: 10px; z-index: 2000; }
        .traloicauhoi span{ color: aliceblue!important; }
        button#traloi { padding: 20px 40px; font-size: 24px; color: #fff; border: none; border-radius: 12px; box-shadow: 0 8px 15px rgba(0,0,0,0.3); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; display: none; }
        button:hover { transform: scale(1.1); box-shadow: 0 12px 20px rgba(0,0,0,0.4); }
        #opcauhoi{ display: none; }
        #questionCountdown{ font-size: 36px; font-weight: bold; }
        .btn-overlay { position: relative; border: none; padding: 0px !important; background: none; background-size: contain; cursor: pointer; }
        .btn-overlay img { width: 160px; height: 50px; }
        .btn-overlay span { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 18px; }
        .btn-overlay:hover span{ color: greenyellow; }
        button {padding:6px; font-size:18px; background:#ffdd00; border:none; cursor:pointer; transition:0.3s; }
        button:hover { background:#ffcc00; border-radius: 10px;}
        .btn_boqua{ background-color: red; color: white !important; }
        #closeMenu{ position: absolute; top:80px; right: 100px; }
        .menu { position: fixed; top: 0; right: 0; background:url("button_menu.png") no-repeat center; color: white; display: flex; align-items: center; gap: 10px; padding:6px; background-size: 100% 100%; border-bottom-left-radius: 10px; z-index: 100; width: auto; max-width: 100vw; }
        #lopname { font-size: 18px; font-weight: 600; margin: 0; white-space: nowrap; }

        .finish-line {
            position: absolute;
            top: 180px;            /* Bằng chiều cao của bờ trên */
            width: 40px;           /* Độ rộng vạch đích */
            height: calc(100% - 180px);
            z-index: 4;            /* Nằm dưới vịt nhưng trên nước */
            background-color: white;
            /* Tạo họa tiết caro đen trắng */
            background-image:
                    linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000),
                    linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            border-right: 2px solid yellow; /* Viền vàng cho nổi bật */
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div id="controls">
    <div id="raceTimer"></div>
    <div class="buton_dk">
        <button id="setupBtn" class="btn-overlay"><img src="button-bg.png" alt=""><span>Tạo đội đua</span></button>
        <button id="startBtn" class="btn-overlay" disabled><img src="button-bg.png" alt=""><span>Bắt đầu</span></button>
    </div>
    <div class="menu">
        <h2 id="lopname"></h2>
        <button id="menuBtn" class="menu-btn">🏅Menu</button>
    </div>
    <div id="winnerMenu" class="winner-menu hidden">
        <div class="menu-container">
            <div class="danhsach">
                <h3>🏆 Học sinh đã chiến thắng</h3>
                <div id="winnerList"></div>
                <div id="soluonghs"></div>

                <div id="musicControl" style="display: flex; align-items: center; gap: 10px; padding: 6px; border-radius: 10px; width: fit-content;">
                    <button id="toggleMusic">🔊 Bật nhạc</button>
                    <label style="display: flex; align-items: center; gap: 5px;">
                        Âm lượng:
                        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5" style="width: 200px;">
                    </label>
                </div>

                <div style="margin-top:10px;">
                    <button id="resetGame" class="btn-overlay"><img src="button_tl.png" alt=""><span>🔄 Reset Game</span></button>
                    <button id="closeMenu" class="btn-overlay"><img src="button_tl.png" alt=""><span>❌</span></button>
                </div>
            </div>

            <div class="setup">
                <h3>🎯 Cấu hình</h3>
                <label style="display:block; margin-top:10px;">
                    <input type="checkbox" id="excludeWinners" checked> Gọi tên không lặp lại
                </label>

                <label>
                    ⏱️ Thời gian đua:
                    <input type="number" id="thoigiandua" value="10" min="5" max="30" style="width:60px;"> giây
                </label>
                <label style="display:block; margin-top:10px;">
                    <input type="checkbox" id="hoatanh"> Hoạt ảnh cao
                </label>

                <h3 style="margin-top:15px;">🎯 Chọn loại cuộc đua:</h3>

                <div class="option">
                    <label><input type="radio" name="race" value="duck" checked> 🦆 Đua vịt</label>
                </div>
                <div class="option">
                    <label><input type="radio" name="race" value="boat"> 🚣‍♂️ Đua thuyền</label>
                </div>
                <div class="option">
                    <label><input type="radio" name="race" value="bird" > 🐧 Đua chim cánh cụt</label>
                </div>
                <div class="option">
                    <label><input type="radio" name="race" value="dongvat" > 🦁 Đua động vật</label>
                </div>

                <h3>🧠 Câu hỏi sau khi thắng</h3>
                <label><input type="checkbox" id="hstraloicauhoi">Cho học sinh trả lời câu hỏi</label><br>
                <div id="opcauhoi">
                    <label id="dangcauhoi"></label><br>
                    <label><input type="checkbox" id="chkLoai"> Loại học sinh nếu trả lời sai</label><br>
                    <label>Số câu hỏi được trả lời: <input type="number" id="numQ" value="3" min="1" max="20" style="width:50px"></label> <br>
                    <label><input type="checkbox" id="chtgtl"> Thời gian trả lời câu hỏi</label><br>
                    <label id="numbertgtlch" style="display:none;">Thời gian trả lời: <input type="number" id="thoigiantraloi" value="15" min="6" max="30" style="width:50px"></label>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="pond-container">
    <div id="vachxuatphat" class="xuatphat"></div>
    <div id="bank"></div>
    <div id="bo" class="bo"></div>
    <div id="startLine" class="start-line"></div>
    <div id="finishLine" class="finish-line"></div>
    <div id="pond"></div>
    <div id="countdown"></div>
    <div id="vachvedich" class="vedich hidden"></div>
</div>

<div class="traloicauhoi">
    <button id="traloi" class="btn-overlay"><img src="button_tl.png" alt=""><span>Trả lời câu hỏi</span></button>
</div>

<div id="result"></div>

<script>
    const data = {
        "tenlop": "Lớp 6E",
        "students": ["Nguyễn Trường An", "Lê Nhật Anh", "Nguyễn Lê Hoài Anh", "Vũ Thiên Ân", "Nguyễn Băng Băng", "Vũ Quỳnh Chi", "Nguyễn Quỳnh Chi", "Nguyễn Nhân Chinh", "Nguyễn Trọng Đạt", "Nguyễn Duy Đông", "Nguyễn Minh Đức", "Lê Tiến Dũng", "Trần Thị Thu Hà", "Đặng An Khang", "Vũ Tử Khánh", "Bùi Đình Tùng Lâm", "Trần Bảo Lâm", "Nguyễn Khánh Linh", "Nguyễn Vũ Minh", "Nguyễn Tuệ Minh", "Vũ Duy Nam", "Ng. Thị Kim Ngân", "Hoàng Trọng Nghĩa", "Nguyễn Thị Thảo Nguyên", "Nguyễn Tuệ Nhi", "Nguyễn Quỳnh Phương", "Nguyễn Như Quỳnh", "Vương Băng Tâm", "Nguyễn Minh Tùng", "Nguyễn Thảo Vân", "Nguyễn Nhật Vy", "Trần Hà Vy"],
        "questions": [
            { "q": "Từ nào sau đây là từ láy hoàn toàn?", "opts": ["Xanh xao", "Xinh xắn", "Mặt mũi", "Thăm thẳm"], "answer": 3 },
            { "q": "Trong câu 'Em làm bài tập về nhà.', bộ phận nào là chủ ngữ?", "opts": ["Em", "làm bài tập", "về nhà", "bài tập"], "answer": 0 }
        ]
    };
</script>

<script src="js/script.js"></script>

</body>
</html>
