<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>🧠 Chinh Phục Câu Hỏi</title>
    <link rel="stylesheet" href="assets/style.css">
    <style>
        body {font-family: Arial, sans-serif; background: #f9fafc; margin:0; padding:0; overflow:hidden;}

        .monkey {width:120px; height:120px; margin-left:10px;}

        .timer span {display:inline-block; transition:transform 0.3s ease;}
        .pulse {animation:pulseAnim 0.6s ease;}
        @keyframes pulseAnim {0%{transform:scale(1);}50%{transform:scale(1.6);}100%{transform:scale(1);} }
        .timer-chicken {width:120px; height:auto; margin-left:20px;} /* gà cạnh đồng hồ */
        .chicken-box {position:fixed; top:340px; right:140px; text-align:center;}
        .chicken-reaction {width:260px; height:auto;}

        .container {
            position: absolute;       /* để căn giữa bằng top/left */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* căn chính giữa */
            width: 600px;             /* chiều rộng cố định */
            height: 526px;
            background: url("assets/bannercauhoi.png") no-repeat center center;
            background-size: contain;
            padding: 80px 30px 20px 30px;
            box-sizing: border-box;
            text-align: center;
        }.question {
             font-size: 24px;
             margin-bottom: 10px;
             word-wrap: break-word;
             width: 100%;
         }
        .options {
            width: 100%;          /* vừa với container */
            max-height: 50%;      /* giới hạn chiều cao các nút */
            padding: 10px 5px;
            box-sizing: border-box;
        }

        .options button {
            display:block;
            width: 100%;
            text-align:left;
            padding: 10px;       /* giảm padding để vừa hơn */
            margin: 8px 0;       /* giảm khoảng cách */
            font-size: 20px;
            border:2px solid #ccc;
            border-radius:8px;
            cursor:pointer;
            background:#f7f7f7;
            transition:background 0.3s;
        }
        .options button:hover:not(:disabled){background:#eee;}
        .options button.correct {background:#c8f7c5; border-color:green;}
        .options button.wrong {background:#f7c5c5; border-color:red;}
        .options button.disabled {background:#ddd!important; color:#777; cursor:not-allowed;}
        .controls {margin-top:20px;}
        .controls button {padding:14px 28px; font-size:20px; border:none; border-radius:8px; cursor:pointer; background:#007bff; color:#fff;}

        .config {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;             /* Khoảng cách giữa các thành phần */
            margin: 20px auto;
            padding: 12px 20px;
            background: #f9f9f9;
            font-size: 16px;
            font-family: Arial, sans-serif;
            max-width: 800px;
        }

        .config input[type="number"] {
            width: 70px;
            padding: 5px 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }
    </style>
    <script>
        window.MathJax = {
            tex: {
                // Cho phép $...$ và \(...\) cho công thức nằm trong dòng (inline)
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                // Cho phép $$...$$ và \[...\] cho công thức hiển thị riêng (display)
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                processEnvironments: true
            },
            options: {
                // Tối ưu hóa render bằng cách chỉ xử lý một số class nhất định (tùy chọn)
                ignoreHtmlClass: 'no-mathjax',
                processHtmlClass: 'process-mathjax'
            }
        };
    </script>

    <script id="MathJax-script" async src="assets/mathjax/mathjax.js"></script>
</head>
<body>

<div id="welcomeScreen">
    <h1 class="title">🧠 Chinh Phục Câu Hỏi</h1>
    <button id="startBtn">🚀 Bắt đầu ngay</button>
</div>
<div id="gameScreen" style="display:none;">
    <div class="thongtinhocsinh">
        <div id="lopname"  class="tths"></div>
        <div class="bangdiem">
            <img src="assets/trangti.png" alt="trang ti" id="trangti" class="trang_ti">
            <span class="score" id="score">0 </span></div>
    </div>
    <div class="level-bar">
        <div class="level-track" id="levelTrack"></div>
        <img src="assets/monkey.png" alt="monkey" id="levelMonkey" class="level-monkey">
        <div class="level-label" id="levelLabel">0/0</div>
    </div>
    <!-- Đồng hồ + gà chạy -->
    <div class="timer">
        <span id="timer">0</span>
        <img src="assets/gadungyen.png" alt="chickenTimer" id="chickenTimer" class="timer-chicken">
    </div>

    <!-- Gà phản ứng ở dưới -->
    <div class="chicken-box"><img src="assets/chicken_stand.png" alt="chicken" id="chickenReaction" class="chicken-reaction"></div>

    <div class="config" style="margin-bottom:0;">
        <label><input type="checkbox" name="random_question" value="1" checked>Trộn ngẫu nhiên câu hỏi và câu trả lời</label><br>
    </div>
    <div class="config" style="margin-top:0;">
        <label>⏳ Thời gian mỗi câu: <input type="number" id="timeConfig" value="15" min="5"></label>
        <label>🔢 Số câu hỏi: <input type="number" id="countConfig" value="3" min="1" max="10"></label>
    </div>

    <div class="container">

        <div class="question" id="question">Nhấn "Bắt đầu" để chơi!</div>
        <div class="options" id="options"></div>

        <button class="button-with-icon controls" id="nextBtn" onclick="nextQuestion()">
            <svg
                    class="icon"
                    id="Play"
                    viewBox="0 0 48 48"
                    xmlns="http://www.w3.org/2000/svg"
            >
                <path
                        class="color000000 svgShape"
                        fill="#ffffff"
                        d="M12 39c-.549 0-1.095-.15-1.578-.447A3.008 3.008 0 0 1 9 36V12c0-1.041.54-2.007 1.422-2.553a3.014 3.014 0 0 1 2.919-.132l24 12a3.003 3.003 0 0 1 0 5.37l-24 12c-.42.21-.885.315-1.341.315z"
                ></path>
            </svg>
            <span class="text">Play</span>
        </button>

    </div>
</div>

<!-- Âm thanh -->
<audio id="correctSound" src="assets/crrec.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="countdownSound" src="assets/demnguoc.mp3" preload="auto"></audio>
<audio id="winSound" src="assets/win.mp3" preload="auto"></audio>

<!-- Import câu hỏi -->


<script src="assets/confetti.browser.min.js"></script>

<script>
    let questions = [];
    let current = -1, score = 0, timer = 0, timerId = null, answered = false;
    let timePerQuestion = 15, totalQuestions = 3;


    const qEl = document.getElementById("question");
    const optsEl = document.getElementById("options");
    const scoreEl = document.getElementById("score");
    const timerEl = document.getElementById("timer");
    const chickenReactionEl = document.getElementById("chickenReaction");
    const chickenTimerEl = document.getElementById("chickenTimer"); // gà cạnh đồng hồ
    const nextBtn = document.getElementById("nextBtn");
    const winSound = document.getElementById("winSound");
    const correctSound = document.getElementById("correctSound");
    const wrongSound = document.getElementById("wrongSound");
    const countdownSound = document.getElementById("countdownSound");

    //Khỉ leo cot
    const levelMonkey = document.getElementById("levelMonkey");
    const levelLabel = document.getElementById("levelLabel");
    let correctCount = 0; // số câu đúng



    const startBtn = document.getElementById("startBtn");
    const welcomeScreen = document.getElementById("welcomeScreen");
    const gameScreen = document.getElementById("gameScreen");


    // Hàm xáo trộn mảng
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // Lấy ngẫu nhiên câu hỏi và trộn opts
    function getRandomQuestions(count) {
        if (questionPool.length < count) {
            questionPool = [...allQuestions];
        }

        let ranQuestion = document.querySelector('[name="random_question"]').checked;

        // Xáo trộn pool
        if(ranQuestion) shuffleArray(questionPool);

        const selected = questionPool.slice(0, count);
        questionPool.splice(0, count); // loại bỏ câu đã lấy

        // Trộn opts và cập nhật answer cho từng câu
        selected.forEach(q => {
            const correctAnswer = q.opts[q.answer]; // lưu đáp án đúng
            if(ranQuestion) shuffleArray(q.opts);
            q.answer = q.opts.indexOf(correctAnswer); // cập nhật vị trí đáp án đúng
        });

        return selected;
    }

    const data = {
        "type":"questions",
        "questions":[{"q":"Lực ma sát trượt xuất hiện khi nào?","opts":[],"answer":0},{"q":"Đơn vị của áp suất trong hệ SI là gì?","opts":["N\/m"],"answer":0},{"q":"Công thức tính áp suất chất lỏng là gì?","opts":["$p = hD$","$p = D - h$"],"answer":0},{"q":"Máy cơ đơn giản có tác dụng gì?","opts":["Làm tăng nhiệt độ","Làm thay đổi hướng hoặc độ lớn lực","Làm vật chạy nhanh hơn"],"answer":1},{"q":"Nhiệt lượng được tính bằng công thức nào?","opts":["$Q = cm\\Delta t$","$Q = m + t$","$Q = \\frac{m}{c}$","$Q = t - mc$"],"answer":0}]    };

    // Nếu có tenlop + students
    if (data.tenlop && data.students) {
        lopname = data.tenlop || "";
        //students = data.students || [];
        document.getElementById("lopname").innerText = "Lớp: "+lopname.toUpperCase();
    }

    // Nếu có câu hỏi
    if (data.type === "questions" && data.questions) {
        questionPool = data.questions || [];

    }

    startBtn.addEventListener("click", () => {
        // thêm class fadeOut để chạy animation
        welcomeScreen.classList.add("fadeOut");

        // sau khi hết hiệu ứng (1s) thì ẩn hẳn và hiện game
        setTimeout(() => {
            welcomeScreen.style.display = "none";
            gameScreen.style.display = "block";
        }, 1000); // 1000ms = 1s trùng với transition
    });

    // Cập nhật thanh level

    function updateLevel() {
        let total = questions.length;
        let progress = correctCount / total;
        let barHeight = 500; // chiều cao thanh level
        let monkeyPos = progress * (barHeight - 60); // 60 là chiều cao con khỉ

        // 🚩 Khi bắt đầu di chuyển -> khỉ leo
        levelMonkey.src = "assets/monkeyclimb.gif";
        levelMonkey.style.bottom = monkeyPos + "px";
        levelLabel.textContent = correctCount + "/" + total;

        // 🚩 Sau khi leo xong -> đổi sang idle hoặc happy
        setTimeout(() => {
            if (correctCount === total) {
                levelMonkey.src = "assets/monkeyhappy.gif"; // leo hết -> vui
            } else {
                levelMonkey.src = "assets/monkeyidle.gif"; // chưa hết -> đứng yên
            }
        }, 800); // chờ animation leo xong
    }


    function playWin(){
        winSound.currentTime = 0;
        winSound.play();
    }

    function launchConfetti(){
        // bắn confetti nhiều lần cho đẹp
        let duration = 3 * 1000; // 3 giây
        let end = Date.now() + duration;

        (function frame() {
            confetti({
                particleCount: 6,
                angle: 60,
                spread: 55,
                origin: { x: 0 }
            });
            confetti({
                particleCount: 6,
                angle: 120,
                spread: 55,
                origin: { x: 1 }
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        }());
    }



    function nextQuestion(){
        clearInterval(timerId);
        stopCountdownSound();
        if(current === -1){
            timePerQuestion = parseInt(document.getElementById("timeConfig").value) || 15;
            totalQuestions = parseInt(document.getElementById("countConfig").value) || 3;



            questions = getRandomQuestions(totalQuestions);

            correctCount = 0; // reset
            updateLevel();    // reset thanh level
            levelMonkey.src = "assets/monkeyidle.gif";


            score = 0;
            scoreEl.firstChild.textContent = score + " ";
            current = 0;
            showQuestion();
            return;
        }
        current++;

        if(current >= questions.length){
            qEl.textContent = "🎉 Hoàn thành! Tổng điểm: " + score;
            optsEl.innerHTML = "";
            nextBtn.textContent = "Chơi lại";

            current = -1;
            return;
        }
        showQuestion();
    }

    function showQuestion(){
        timer = timePerQuestion;
        timerEl.textContent = timer;
        answered = false;
        let q = questions[current];
        qEl.textContent = `Câu ${current+1}/${questions.length}: ${q.q}`;
        optsEl.innerHTML = "";
        q.opts.forEach((opt,i)=>{
            const btn=document.createElement("button");
            btn.textContent = String.fromCharCode(65+i)+". "+opt;
            btn.onclick=()=>selectAnswer(i,q.answer,btn);
            optsEl.appendChild(btn);
        });
        nextBtn.style.display="none";

        // 🚩 Khi bắt đầu câu hỏi -> gà chạy
        chickenTimerEl.src = "assets/ga_chay.gif";

        timerId=setInterval(()=>{
            timer--;
            timerEl.textContent=timer;
            if(timer===10){ playCountdownSound(); }
            if(timer<=6 && timer>0){
                timerEl.classList.add("pulse");
                setTimeout(()=>timerEl.classList.remove("pulse"),500);
            }
            if(timer<=0){
                clearInterval(timerId);
                // 🚩 Hết giờ -> gà đứng yên
                chickenTimerEl.src = "assets/gadungyen.png";
                chickenReactionEl.src = "assets/chicken_buon.png";
                setTimeout(()=>{ chickenReactionEl.src = "assets/chicken_stand.png"; },3000);
                setTimeout(()=>{ stopCountdownSound(); },3000);
                disableOptions();
                nextBtn.style.display="inline-block";
                nextBtn.textContent="Tiếp tục";
            }
        },1000);

        if (typeof MathJax !== 'undefined') {
            const questionContainer = document.getElementById('question');
            if (questionContainer) MathJax.typesetPromise([questionContainer]);
            const optionsContainer = document.getElementById('options');
            if (optionsContainer) MathJax.typesetPromise([optionsContainer]);

            MathJax.typeset();
        }
    }

    function selectAnswer(idx,correct,btn){
        if(answered) return;
        answered = true;
        clearInterval(timerId);
        stopCountdownSound();

        // 🚩 Khi chọn đáp án -> gà đứng yên
        chickenTimerEl.src = "assets/gadungyen.png";

        const buttons=optsEl.querySelectorAll("button");
        buttons.forEach((b,i)=>{
            b.disabled=true;
            if(i===correct) b.classList.add("correct");
            if(i===idx && idx!==correct) b.classList.add("wrong");
        });
        if(idx===correct){
            score+=10;
            scoreEl.firstChild.textContent = score + " ";
            playCorrect();
            showChicken("happy");

            correctCount++;
            updateLevel();
            updateLevel();

            if(score === questions.length * 10){
                playWin();
                launchConfetti();
            }
        } else {
            playWrong();
            showChicken("angry");
        }
        setTimeout(()=>{
            nextBtn.style.display="inline-block";
            nextBtn.textContent = (current >= questions.length-1) ? "Kết thúc" : "Tiếp tục";
        },800);
    }

    function disableOptions(){
        const buttons=optsEl.querySelectorAll("button");
        buttons.forEach(b=>{
            b.disabled=true;
            b.classList.add("disabled");
        });
    }

    function showChicken(state){
        if(state==="happy"){ chickenReactionEl.src = "assets/chicken_happy.gif"; }
        else if(state==="angry"){ chickenReactionEl.src = "assets/chicken_angry.gif"; }
        setTimeout(()=>{ chickenReactionEl.src = "assets/chicken_stand.png"; },3000);
    }

    function playCorrect(){ correctSound.currentTime=0; correctSound.play(); }
    function playWrong(){ wrongSound.currentTime=0; wrongSound.play(); }
    function playCountdownSound(){ countdownSound.currentTime=0; countdownSound.play(); }
    function stopCountdownSound(){ countdownSound.pause(); countdownSound.currentTime=0; }
</script>
</body>
</html>
