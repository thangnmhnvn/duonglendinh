<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Vòng quay học sinh - Chiếc Nón Kỳ Diệu</title>
    <link rel="stylesheet" href="style.css">

    <style>
        :root {
            --size: 480px;
            --border: 10px;
        }

        h1{ margin:8px 0 0; font-size:22px; font-weight:800; letter-spacing:.2px;    text-align: center;}
        .wrap{ position:relative; width:var(--size); height:var(--size); margin:22px auto 8px; }
        #wheel{
            width:100%; height:100%; display:block; border-radius:50%;
            box-shadow: 0 12px 30px rgba(0,0,0,.18), inset 0 0 0 var(--border) #111;
            cursor:pointer; background:#fff;
        }
        /* Mũi tên hướng xuống */
        .pointer{
            position:absolute; left:50%; top:-14px; transform:translateX(-50%);
            width:0; height:0;
            border-left: 22px solid transparent;
            border-right:22px solid transparent;
            border-top: 44px solid #e11d48; /* đỏ, hướng xuống */
            filter: drop-shadow(0 6px 6px rgba(0,0,0,.25));
            z-index:5;
        }
        .hint{ font-size:14px; opacity:.8; margin:6px 0 0 }
        .result{
            margin-top:10px; font-size:20px; font-weight:800; color:#0ea5e9;
            text-shadow: 0 1px 0 #fff;
        }
        .bar{
            width:min(560px, 92vw); height:10px; border-radius:999px; background:#e5e7eb; overflow:hidden; margin-top:10px;
        }
        .fill{ height:100%; width:0%; background:linear-gradient(90deg,#34d399,#22c55e); transition:width .1s; }
    </style>


    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                processEnvironments: true
            },
            options: {
                ignoreHtmlClass: 'no-mathjax',
                processHtmlClass: 'process-mathjax'
            }
        };
    </script>
    <script id="MathJax-script" async src="mathjax.js"></script>
    <script src="jquery-3.7.1.min.js"></script>
    <script src="confetti.browser.min.js"></script>
    <script src="script.js"></script>
    <script>
        Object.assign(GameApp, {
            config: {
                MAX_ANGULAR_VEL: 0.45,
                ACCEL_PER_MS: 0.00028,
                DECAY: 0.985,
                MIN_SPIN_MS: 5000,
                CLASS_KEY_PREFIX: "vongquaytracnghiem_",
                initialData: {
                    "tenlop": "Lớp 6E",
                    "students": ["Nguyễn Trường An", "Lê Nhật Anh", "Nguyễn Lê Hoài Anh", "Vũ Thiên Ân", "Nguyễn Băng Băng", "Vũ Quỳnh Chi", "Nguyễn Quỳnh Chi", "Nguyễn Nhân Chinh", "Nguyễn Trọng Đạt", "Nguyễn Duy Đông", "Nguyễn Minh Đức", "Lê Tiến Dũng", "Trần Thị Thu Hà", "Đặng An Khang", "Vũ Tử Khánh", "Bùi Đình Tùng Lâm", "Trần Bảo Lâm", "Nguyễn Khánh Linh", "Nguyễn Vũ Minh", "Nguyễn Tuệ Minh", "Vũ Duy Nam", "Ng. Thị Kim Ngân", "Hoàng Trọng Nghĩa", "Nguyễn Thị Thảo Nguyên", "Nguyễn Tuệ Nhi", "Nguyễn Quỳnh Phương", "Nguyễn Như Quỳnh", "Vương Băng Tâm", "Nguyễn Minh Tùng", "Nguyễn Thảo Vân", "Nguyễn Nhật Vy", "Trần Hà Vy"],
                    "questions": [
                        { "q": "Từ nào sau đây là từ láy hoàn toàn?", "opts": ["Xanh xao", "Xinh xắn", "Mặt mũi", "Thăm thẳm"], "answer": 3 },
                        { "q": "Trong câu 'Em làm bài tập về nhà.', bộ phận nào là chủ ngữ?", "opts": ["Em", "làm bài tập", "về nhà", "bài tập"], "answer": 0 },
                        { "q": "Biện pháp tu từ nào được sử dụng trong câu 'Mặt trời là lòng đỏ quả trứng khổng lồ'?", "opts": ["So sánh", "Nhân hóa", "Ẩn dụ", "Hoán dụ"], "answer": 0 },
                        { "q": "Từ nào là tính từ chỉ tính cách?", "opts": ["Cái bàn", "Vui vẻ", "Nhảy", "Cao"], "answer": 1 },
                        { "q": "Thành phần nào trả lời cho câu hỏi 'Khi nào?' trong câu 'Hôm qua, em được điểm 10.'", "opts": ["Em", "được điểm 10", "Hôm qua", "điểm 10"], "answer": 2 },
                        { "q": "Từ nào là từ láy bộ phận?", "opts": ["Lặng lẽ", "Xinh xắn", "Chăm chỉ", "Lung linh"], "answer": 1 },
                        { "q": "Từ nào là đại từ nhân xưng ngôi thứ nhất (số ít)?", "opts": ["Bạn", "Họ", "Tôi", "Các bạn"], "answer": 2 },
                        { "q": "Biện pháp tu từ nào được sử dụng trong câu 'Những ngôi sao thức ngoài kia'?", "opts": ["So sánh", "Nhân hóa", "Ẩn dụ", "Hoán dụ"], "answer": 1 },
                        { "q": "Từ nào là từ chỉ đặc điểm của sự vật?", "opts": ["Ngôi nhà", "Chạy nhảy", "Xanh biếc","Ăn uống"], "answer": 2 },
                        { "q": "Trong câu 'Chú bộ đội dũng cảm bảo vệ Tổ quốc.', từ nào là danh từ chỉ người?", "opts": ["dũng cảm", "bảo vệ", "Chú bộ đội", "Tổ quốc"], "answer": 2 }
                    ]
                },
                media: {
                    ga_chay: 'ga_chay.gif',
                    gadungyen: 'gadungyen.png',
                    chicken_buon: 'chicken_buon.png',
                    chicken_stand: 'chicken_stand.png',
                    monkeyclimb: 'monkeyclimb.gif',
                    monkeyhappy: 'monkeyhappy.gif',
                    monkeyidle: 'monkeyidle.gif',
                    ga_chay: 'chicken_happy.gif',
                    ga_chay: 'chicken_angry.gif',
                    ga_chay: 'chicken_stand.png'
                }
            }
        });

        $(document).ready(function() {
            GameApp.init();
        });
    </script>
</head>
<body>
<audio id="tickSound" src="vongquay.mp3" preload="auto"></audio>
<audio id="winSoundvq" src="chucmung.mp3" preload="auto"></audio>
<audio id="correctSound" src="crrec.mp3" preload="auto"></audio>
<audio id="wrongSound" src="wrong.mp3" preload="auto"></audio>
<audio id="countdownSound" src="demnguoc.mp3" preload="auto"></audio>
<audio id="winSound" src="win.mp3" preload="auto"></audio>

<div id="welcomeScreen">
    <h1 class="title">VÒNG QUAY VÀ TRẮC NGHIỆM</h1>
    <button id="startBtn">🚀 Bắt đầu ngay</button>
</div>

<div id="man_vongquay" style="display: none">
    <div class="left">
        <h2 id="lopname"></h2>
        <h3>Danh sách đã gọi</h3>
        <ul id="studentList"></ul>
    </div>
    <div class="right">
        <button id="to_trochoi" class="btn_r">🎮 Tới Trò Chơi</button>
        <button id="reset_games" class="btn_r"> Reset game </button>
        <div id="chon_che_do">
            <label><input type="checkbox" name="che_do" value="Gọi tên không lặp lại" id="che_do_goi_ten" class="chon_chedo">Gọi tên không lặp lại</label><br>
        </div>
    </div>
    <h1>🎡 VÒNG QUAY MAY MẮN</h1>
    <div class="wrap">
        <div class="pointer"></div>
        <canvas id="wheel" width="960" height="960" title="Nhấn & giữ để lấy lực, thả để quay"></canvas>
    </div>
    <div class="bar" aria-hidden="true"><div class="fill" id="chargeFill"></div></div>
    <div class="hint" id="hint">Giữ chuột (hoặc chạm giữ) vào vòng quay để lấy lực • Tối thiểu quay 5 giây</div>
    <div class="result" id="result" style="font-size: 36px"></div>
</div>

<div id="man_trochoi" style="display:none">
    <div class="right_down" style="display:none">
        <button id="back_vongquay" class="btn_r">Về Vòng Quay</button>
    </div>
    <div id="gameScreen" >
        <div class="thongtinhocsinh">
            <span id="ten_hocsinh"  class="tths"></span>
        </div >
        <div><img src="trangti.png" alt="trang ti" id="trangti" class="trang_ti">
            <span class="score" id="score">0 </span></div>
        <div class="level-bar">
            <div class="level-track" id="levelTrack"></div>
            <img src="monkey.png" alt="monkey" id="levelMonkey" class="level-monkey">
            <div class="level-label" id="levelLabel">0/0</div>
        </div>
        <div class="timer">
            <span id="timer">0</span>
            <img src="gadungyen.png" alt="chickenTimer" id="chickenTimer" class="timer-chicken">
        </div>

        <div class="chicken-box"><img src="chicken_stand.png" alt="chicken" id="chickenReaction" class="chicken-reaction"></div>
        <div class="config" style="margin-bottom:0;">
            <label><input type="checkbox" name="random_question" value="1" checked>Trộn ngẫu nhiên câu hỏi và câu trả lời</label><br>
        </div>
        <div class="config" style="margin-top:0;">
            <label>⏳ Thời gian mỗi câu: <input type="number" id="timeConfig" value="15" min="5"></label>
            <label>🔢 Số câu hỏi: <input type="number" id="countConfig" value="3" min="1" max="10"></label>
        </div>
        <div class="container">
            <div class="question" id="question">Nhấn "Bắt đầu" để chơi!</div>
            <div class="options" id="options"></div>

            <button class="button-with-icon controls" id="nextBtn">
                <svg
                        class="icon"
                        id="Play"
                        viewBox="0 0 48 48"
                        xmlns="http://www.w3.org/2000/svg"
                >
                    <path
                            class="color000000 svgShape"
                            fill="#ffffff"
                            d="M12 39c-.549 0-1.095-.15-1.578-.447A3.008 3.008 0 0 1 9 36V12c0-1.041.54-2.007 1.422-2.553a3.014 3.014 0 0 1 2.919-.132l24 12a3.003 3.003 0 0 1 0 5.37l-24 12c-.42.21-.885.315-1.341.315z"
                    ></path>
                </svg>
                <span class="text">Play</span>
            </button>
        </div>
    </div>
</div>
</body>
</html>
